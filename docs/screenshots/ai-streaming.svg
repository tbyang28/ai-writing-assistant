<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0f172a"/>
  <rect x="0" y="0" width="250" height="900" fill="#1e293b" stroke="#334155"/>
  <text x="36" y="60" fill="#818cf8" font-size="30" font-family="Arial, sans-serif" font-weight="800">AI 写作助手</text>
  <rect x="32" y="130" width="186" height="58" rx="12" fill="#e0e7ff"/>
  <text x="78" y="167" fill="#4f46e5" font-size="20" font-family="Arial, sans-serif" font-weight="700">我的作品</text>

  <rect x="250" y="0" width="330" height="900" fill="#1e293b" stroke="#334155"/>
  <text x="280" y="48" fill="#94a3b8" font-size="20" font-family="Arial, sans-serif">← 返回</text>
  <text x="280" y="92" fill="#f8fafc" font-size="22" font-family="Arial, sans-serif" font-weight="800">雨巷边缘</text>
  <line x1="250" y1="124" x2="580" y2="124" stroke="#334155"/>
  <text x="315" y="176" fill="#818cf8" font-size="20" font-family="Arial, sans-serif" font-weight="800">章节</text>
  <text x="420" y="176" fill="#94a3b8" font-size="20" font-family="Arial, sans-serif" font-weight="800">大纲</text>
  <text x="520" y="176" fill="#94a3b8" font-size="20" font-family="Arial, sans-serif" font-weight="800">角色</text>
  <line x1="285" y1="208" x2="395" y2="208" stroke="#6366f1" stroke-width="4"/>
  <rect x="270" y="250" width="290" height="86" rx="10" fill="#273449" stroke="#334155"/>
  <text x="294" y="290" fill="#f8fafc" font-size="22" font-family="Arial, sans-serif" font-weight="800">第一章 初遇</text>
  <text x="294" y="322" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">955 字</text>

  <rect x="580" y="0" width="650" height="900" fill="#0f172a"/>
  <rect x="580" y="0" width="650" height="64" fill="#1e293b" stroke="#334155"/>
  <text x="610" y="42" fill="#f8fafc" font-size="24" font-family="Arial, sans-serif" font-weight="800">第一章 初遇</text>
  <rect x="1030" y="18" width="84" height="34" rx="12" fill="#6366f1"/>
  <text x="1072" y="41" fill="#ffffff" font-size="16" font-family="Arial, sans-serif" font-weight="800" text-anchor="middle">编辑器</text>
  <text x="1135" y="41" fill="#94a3b8" font-size="16" font-family="Arial, sans-serif">关系图</text>
  <g font-family="Georgia, serif" font-size="25" fill="#e5e7eb">
    <text x="640" y="160"># 初遇片段</text>
    <text x="640" y="235">那是个细雨蒙蒙的傍晚，林知意撑着一把碎花小伞，</text>
    <text x="640" y="295">怀里抱着一本刚从图书馆借来的书，匆匆走在回宿舍的路上。</text>
    <text x="640" y="380">转过街角时，一辆黑色轿车突然从旁驶出，溅起一片水花。</text>
    <text x="640" y="465">“小心——”</text>
    <text x="640" y="550">她还没反应过来，整个人就被一股力道拽向路边。</text>
  </g>

  <rect x="1230" y="0" width="370" height="900" fill="#1e293b" stroke="#334155"/>
  <rect x="1230" y="0" width="370" height="64" fill="#1e293b" stroke="#334155"/>
  <text x="1260" y="42" fill="#f8fafc" font-size="24" font-family="Arial, sans-serif" font-weight="800">AI 助手</text>
  <rect x="1338" y="14" width="146" height="38" rx="10" fill="#172033" stroke="#475569"/>
  <text x="1362" y="39" fill="#cbd5e1" font-size="16" font-family="Arial, sans-serif">默认模型</text>
  <text x="1260" y="116" fill="#64748b" font-size="16" font-family="Arial, sans-serif">快捷操作</text>
  <rect x="1260" y="142" width="58" height="36" rx="10" fill="#312e81"/>
  <text x="1289" y="166" fill="#a5b4fc" font-size="16" font-family="Arial, sans-serif" font-weight="800" text-anchor="middle">续写</text>
  <rect x="1334" y="142" width="58" height="36" rx="10" fill="#064e3b"/>
  <text x="1363" y="166" fill="#6ee7b7" font-size="16" font-family="Arial, sans-serif" font-weight="800" text-anchor="middle">润色</text>
  <rect x="1408" y="142" width="80" height="36" rx="10" fill="#0f766e"/>
  <text x="1448" y="166" fill="#99f6e4" font-size="16" font-family="Arial, sans-serif" font-weight="800" text-anchor="middle">Diff 润色</text>

  <rect x="1260" y="220" width="300" height="495" rx="18" fill="#172033"/>
  <text x="1284" y="268" fill="#f8fafc" font-size="22" font-family="Arial, sans-serif" font-weight="800">AI 正在续写...</text>
  <g font-family="Arial, sans-serif" font-size="20" fill="#e5e7eb">
    <text x="1284" y="322">男人的手很冷，黑色西装笔挺利落，</text>
    <text x="1284" y="360">眉目间带着一种与校园格格不入的</text>
    <text x="1284" y="398">沉静。他松开手，目光越过林知意，</text>
    <text x="1284" y="436">落在她怀里的那本旧校刊上。</text>
    <text x="1284" y="500">“别再查陈默。”他说。</text>
    <text x="1284" y="562">雨声忽然重了，像替这句话按下了</text>
    <text x="1284" y="600">某个迟来的封印。</text>
  </g>
  <rect x="1284" y="642" width="130" height="32" rx="16" fill="#312e81">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="1.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="1260" y="748" width="300" height="78" rx="14" fill="#172033" stroke="#475569"/>
  <text x="1284" y="795" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">输入问题...</text>
  <rect x="1430" y="842" width="70" height="38" rx="12" fill="#6366f1"/>
  <text x="1465" y="867" fill="#ffffff" font-size="16" font-family="Arial, sans-serif" font-weight="800" text-anchor="middle">发送</text>
</svg>
