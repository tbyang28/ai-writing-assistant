    <text x="0" y="292" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">作品管理、章节编辑、AI 续写、人物关系图谱与 RAG 上下文增强。</text>

    <g transform="translate(0 390)">
      <rect width="240" height="130" rx="18" fill="#1e293b" stroke="#334155"/>
