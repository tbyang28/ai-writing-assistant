<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="100" y="90" fill="#67e8f9" font-size="22" font-family="Arial, sans-serif" font-weight="700" letter-spacing="8">RAG RETRIEVAL</text>
  <text x="100" y="145" fill="#f8fafc" font-size="48" font-family="Arial, sans-serif" font-weight="800">语义检索增强效果</text>
  <text x="100" y="190" fill="#94a3b8" font-size="22" font-family="Arial, sans-serif">用户续写前，系统会从同一本书的历史章节中召回最相关的上下文，再拼入 Prompt。</text>

  <g transform="translate(100 250)">
    <rect width="390" height="500" rx="24" fill="#1e293b" stroke="#334155"/>
    <text x="32" y="55" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif" font-weight="800">当前输入</text>
    <rect x="32" y="92" width="326" height="118" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="56" y="136" fill="#e5e7eb" font-size="20" font-family="Arial, sans-serif">周临为什么知道陈默</text>
    <text x="56" y="170" fill="#e5e7eb" font-size="20" font-family="Arial, sans-serif">失踪前的监控申请？</text>
    <text x="32" y="270" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">Query Embedding</text>
    <g transform="translate(32 305)">
      <rect width="36" height="70" rx="8" fill="#22d3ee"/>
      <rect x="48" width="36" height="118" rx="8" fill="#6366f1"/>
      <rect x="96" width="36" height="92" rx="8" fill="#38bdf8"/>
      <rect x="144" width="36" height="130" rx="8" fill="#818cf8"/>
      <rect x="192" width="36" height="78" rx="8" fill="#2dd4bf"/>
      <rect x="240" width="36" height="108" rx="8" fill="#60a5fa"/>
    </g>
  </g>

  <g transform="translate(585 250)">
    <rect width="430" height="500" rx="24" fill="#1e293b" stroke="#334155"/>
    <text x="32" y="55" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif" font-weight="800">召回片段 Top 5</text>
    <g transform="translate(32 92)">
      <rect width="366" height="76" rx="14" fill="#0f172a" stroke="#22d3ee"/>
      <text x="20" y="30" fill="#67e8f9" font-size="18" font-family="Arial, sans-serif" font-weight="800">score 0.8421</text>
      <text x="20" y="58" fill="#e5e7eb" font-size="18" font-family="Arial, sans-serif">陈默失踪前最后一份申请：调取南门监控录像。</text>
    </g>
    <g transform="translate(32 188)">
      <rect width="366" height="76" rx="14" fill="#0f172a" stroke="#334155"/>
      <text x="20" y="30" fill="#a5b4fc" font-size="18" font-family="Arial, sans-serif" font-weight="800">score 0.7938</text>
      <text x="20" y="58" fill="#e5e7eb" font-size="18" font-family="Arial, sans-serif">周临警告知足不要继续追查陈默的失踪。</text>
    </g>
    <g transform="translate(32 284)">
      <rect width="366" height="76" rx="14" fill="#0f172a" stroke="#334155"/>
      <text x="20" y="30" fill="#a5b4fc" font-size="18" font-family="Arial, sans-serif" font-weight="800">score 0.7514</text>
      <text x="20" y="58" fill="#e5e7eb" font-size="18" font-family="Arial, sans-serif">知足母亲的旧信中多次出现陈默的名字。</text>
    </g>
    <g transform="translate(32 380)">
      <rect width="366" height="76" rx="14" fill="#0f172a" stroke="#334155"/>
      <text x="20" y="30" fill="#a5b4fc" font-size="18" font-family="Arial, sans-serif" font-weight="800">score 0.7062</text>
      <text x="20" y="58" fill="#e5e7eb" font-size="18" font-family="Arial, sans-serif">迎新当天有人替换了新生档案。</text>
    </g>
  </g>

  <g transform="translate(1110 250)">
    <rect width="390" height="500" rx="24" fill="#1e293b" stroke="#334155"/>
    <text x="32" y="55" fill="#f8fafc" font-size="28" font-family="Arial, sans-serif" font-weight="800">注入 Prompt</text>
    <rect x="32" y="92" width="326" height="290" rx="16" fill="#0f172a" stroke="#334155"/>
    <text x="56" y="132" fill="#67e8f9" font-size="18" font-family="Arial, sans-serif">[相关背景]</text>
    <text x="56" y="170" fill="#e5e7eb" font-size="18" font-family="Arial, sans-serif">陈默失踪前最后一份申请...</text>
    <text x="56" y="206" fill="#e5e7eb" font-size="18" font-family="Arial, sans-serif">周临警告知足不要继续追查...</text>
    <text x="56" y="242" fill="#e5e7eb" font-size="18" font-family="Arial, sans-serif">知足母亲的旧信中出现陈默...</text>
    <text x="56" y="278" fill="#67e8f9" font-size="18" font-family="Arial, sans-serif">[/相关背景]</text>
    <text x="56" y="332" fill="#c4b5fd" font-size="18" font-family="Arial, sans-serif">请基于以上背景自然续写。</text>
    <rect x="32" y="414" width="326" height="54" rx="14" fill="url(#accent)"/>
    <text x="195" y="449" fill="#ffffff" font-size="20" font-family="Arial, sans-serif" font-weight="800" text-anchor="middle">减少设定遗忘</text>
  </g>

  <path d="M505 500H560" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1030 500H1085" stroke="#6366f1" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
  </defs>
</svg>
