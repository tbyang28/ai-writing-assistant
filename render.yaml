services:
  - type: web
    name: ai-writing-assistant-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////app/data/writing_platform.db
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: SILICONFLOW_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: DEEPSEEK_MODEL
        value: deepseek-ai/DeepSeek-V4-Flash
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: 'https://.*\.(vercel\.app|onrender\.com)'

  - type: web
    name: ai-writing-assistant-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
